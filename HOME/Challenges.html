                    <div class="w-10 h-10 bg-indigo-100 text-indigo-700 rounded-lg flex items-center justify-center text-lg">
                        <i class="fa-solid ${item.icon}"></i>
                    </div>
                    <div>
                        <h2 class="font-bold text-sm text-indigo-900 uppercase tracking-wider leading-none">${item.name}</h2>
                        <p class="text-[10px] text-slate-500 mt-1 uppercase leading-none">${item.examples.join(', ')}</p>
                    </div>
                </div>

                <div class="space-y-2 flex-grow">
                    <div class="text-xs">
                        <span class="text-red-600 font-bold uppercase text-[9px]">The Challege:</span>
                        <p class="italic text-slate-700">"${item.lie}"</p>
                    </div>
                    <div class="text-xs">
                        <span class="text-green-600 font-bold uppercase text-[9px]">The Freedom:</span>
                        <p class="font-semibold text-indigo-900">${item.freedom}</p>
                    </div>
                </div>

                <div class="mt-3 pt-3 border-t border-slate-100">
                    <p class="text-[11px] leading-relaxed text-slate-600 italic">"${item.scripture}"</p>
                    <p class="text-[10px] font-bold text-indigo-600 mt-1">— ${item.reference}</p>
                </div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
