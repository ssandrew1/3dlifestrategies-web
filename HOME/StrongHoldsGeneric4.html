<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiritual Strongholds Explorer</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            color: white;
            padding: 30px 0;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            transition: all 0.3s ease;
        }

        .main-content.split-view {
            grid-template-columns: 1fr 1fr;
        }

        .main-content.ai-fullscreen .explorer-section {
            display: none;
        }

        .main-content.ai-fullscreen {
            grid-template-columns: 1fr;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .search-bar {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #667eea;
            border-radius: 10px;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.3s;
        }

        .search-bar:focus {
            border-color: #764ba2;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .stronghold-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stronghold-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .stronghold-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border-color: #667eea;
        }

        .stronghold-card.selected {
            border-color: #764ba2;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .stronghold-card h3 {
            font-size: 1.3em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stronghold-card .examples {
            font-size: 0.9em;
            opacity: 0.8;
            margin: 10px 0;
        }

        .stronghold-card .freedom {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(0,0,0,0.1);
            font-weight: bold;
        }

        .stronghold-card.selected .freedom {
            border-top-color: rgba(255,255,255,0.3);
        }

        .ai-chat-section {
            display: flex;
            flex-direction: column;
            height: 80vh;
            position: relative;
        }

        .ai-chat-section.fullscreen {
            height: 85vh;
        }

        .chat-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
        }

        .chat-controls h2 {
            color: #667eea;
        }

        .view-toggle {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #e0e7ff;
            color: #667eea;
        }

        .btn-secondary:hover {
            background: #c7d2fe;
        }

        .example-prompts {
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .example-prompts strong {
            white-space: nowrap;
        }

        .example-prompts select {
            flex: 1;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f9fafb;
            border-radius: 10px;
            margin: 15px 0;
        }

        .message {
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 10px;
            max-width: 85%;
            animation: slideIn 0.3s ease;
            position: relative;
        }

        .message h1, .message h2, .message h3, .message h4 {
            margin: 15px 0 10px 0;
            color: inherit;
        }

        .message ul, .message ol {
            margin: 10px 0;
            padding-left: 25px;
        }

        .message li {
            margin: 5px 0;
        }

        .message code {
            background: rgba(0,0,0,0.1);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }

        .message pre {
            background: rgba(0,0,0,0.1);
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .message table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }

        .message thead {
            background: #667eea;
            color: white;
        }

        .message th, .message td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        .message tbody tr:nth-child(even) {
            background: #f9fafb;
        }

        .message tbody tr:hover {
            background: #f0f0f0;
        }

        .message-actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
        }

        .message-actions .icon-btn {
            padding: 5px 10px;
            font-size: 0.9em;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            background: #667eea;
            color: white;
            margin-left: auto;
        }

        .message.assistant {
            background: white;
            border: 1px solid #e5e7eb;
        }

        .message.system {
            background: #fef3c7;
            border: 1px solid #fbbf24;
            max-width: 100%;
            text-align: center;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 15px;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 16px;
            resize: vertical;
            min-height: 50px;
            max-height: 150px;
            font-family: inherit;
        }

        .history-panel {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 15px rgba(0,0,0,0.2);
            transition: right 0.3s ease;
            z-index: 1000;
            overflow-y: auto;
        }

        .history-panel.open {
            right: 0;
        }

        .history-header {
            padding: 20px;
            background: #667eea;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .history-item {
            padding: 15px;
            border-bottom: 1px solid #e5e7eb;
            cursor: pointer;
            transition: background 0.3s;
        }

        .history-item:hover {
            background: #f9fafb;
        }

        .history-item-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }

        .history-item-text {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .history-response {
            font-size: 0.85em;
            color: #888;
            margin-top: 8px;
            padding: 10px;
            background: #f9fafb;
            border-radius: 5px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .history-response.expanded {
            max-height: 500px;
            overflow-y: auto;
        }

        .history-response.last-run {
            max-height: 500px;
            overflow-y: auto;
        }

        .history-item-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #667eea;
            font-size: 1.1em;
            padding: 5px;
            transition: all 0.3s;
        }

        .icon-btn:hover {
            color: #764ba2;
            transform: scale(1.2);
        }

        .icon-btn.delete:hover {
            color: #ef4444;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .detail-section {
            margin: 15px 0;
        }

        .detail-section h4 {
            color: #764ba2;
            margin-bottom: 10px;
        }

        .scripture {
            background: #fef3c7;
            padding: 15px;
            border-left: 4px solid #fbbf24;
            border-radius: 5px;
            font-style: italic;
            margin: 10px 0;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #667eea;
        }

        .spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .main-content.split-view {
                grid-template-columns: 1fr;
            }

            .history-panel {
                width: 100%;
                right: -100%;
            }

            header h1 {
                font-size: 1.8em;
            }

            .stronghold-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-dove"></i> Spiritual Strongholds Explorer</h1>
            <p>Discover freedom in Christ through understanding and overcoming spiritual strongholds</p>
        </header>

        <div class="main-content" id="mainContent">
            <div class="explorer-section">
                <div class="card">
                    <input type="text" class="search-bar" id="searchBar" placeholder="?? Search strongholds, examples, or freedoms...">

                    <div class="stronghold-grid" id="strongholdGrid"></div>
                </div>
            </div>

            <div class="card ai-chat-section" id="aiChatSection">
                <div class="chat-controls">
                    <h2><i class="fas fa-comments"></i> AI Guidance</h2>
                    <div class="view-toggle">
                        <button class="btn btn-secondary" id="apiSettingsBtn" title="API Settings">
                            <i class="fas fa-key"></i>
                        </button>
                        <button class="btn btn-secondary" id="historyBtn" title="View History">
                            <i class="fas fa-history"></i>
                        </button>
                        <button class="btn btn-secondary" id="toggleViewBtn" title="Toggle View">
                            <i class="fas fa-expand"></i>
                        </button>
                    </div>
                </div>

                <div class="example-prompts">
                    <strong>Example Prompts:</strong>
                    <select class="search-bar" id="promptSelect" style="margin: 0; padding: 10px;">
                        <option value="">-- Select an example prompt --</option>
                    </select>
                </div>

                <div class="chat-messages" id="chatMessages"></div>

                <div class="chat-input-area">
                    <textarea class="chat-input" id="chatInput" placeholder="Ask about strongholds, share your struggles, or request guidance..."></textarea>
                    <button class="btn btn-primary" id="sendBtn">
                        <i class="fas fa-paper-plane"></i> Send
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="history-panel" id="historyPanel">
        <div class="history-header">
            <h3><i class="fas fa-history"></i> Conversation History</h3>
            <button class="icon-btn" id="closeHistoryBtn">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div id="historyList"></div>
    </div>

    <div class="modal" id="detailModal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        const strongholds = [
            {
                name: "BITTERNESS",
                icon: "fa-heart-crack",
                examples: ["Resentment", "Hatred", "Unforgiveness", "Anger"],
                lie: "I have power and protection when I don't forgive others",
                freedom: "FORGIVENESS",
                scripture: "Therefore, if anyone is in Christ, the new creation has come: The old has gone, the new is here! All this is from God, who reconciled us to himself through Christ and gave us the ministry of reconciliation.",
                reference: "2 Corinthians 5:17-19"
            },
            {
                name: "FEAR",
                icon: "fa-ghost",
                examples: ["Anxiety", "Worry", "Panic", "Dread", "Phobias"],
                lie: "I must control everything to stay safe; God cannot be trusted with my future",
                freedom: "PEACE & TRUST",
                scripture: "For God has not given us a spirit of fear, but of power and of love and of a sound mind.",
                reference: "2 Timothy 1:7"
            },
            {
                name: "PRIDE",
                icon: "fa-crown",
                examples: ["Arrogance", "Self-righteousness", "Superiority", "Boasting"],
                lie: "I am better than others; I don't need God or anyone else",
                freedom: "HUMILITY",
                scripture: "Humble yourselves before the Lord, and he will lift you up.",
                reference: "James 4:10"
            },
            {
                name: "SHAME",
                icon: "fa-mask",
                examples: ["Self-condemnation", "Unworthiness", "Guilt", "Hiding"],
                lie: "I am too damaged or sinful to be loved by God or others",
                freedom: "IDENTITY IN CHRIST",
                scripture: "Therefore, there is now no condemnation for those who are in Christ Jesus.",
                reference: "Romans 8:1"
            },
            {
                name: "CONTROL",
                icon: "fa-hand-fist",
                examples: ["Manipulation", "Domination", "Perfectionism", "Micromanaging"],
                lie: "If I don't control everything and everyone, things will fall apart",
                freedom: "SURRENDER & TRUST",
                scripture: "Trust in the LORD with all your heart and lean not on your own understanding; in all your ways submit to him, and he will make your paths straight.",
                reference: "Proverbs 3:5-6"
            },
            {
                name: "REJECTION",
                icon: "fa-user-slash",
                examples: ["People-pleasing", "Fear of abandonment", "Isolation", "Approval-seeking"],
                lie: "I am not wanted; I must earn love and acceptance",
                freedom: "ACCEPTANCE & BELONGING",
                scripture: "But to all who did receive him, who believed in his name, he gave the right to become children of God.",
                reference: "John 1:12"
            },
            {
                name: "LUST",
                icon: "fa-fire",
                examples: ["Sexual immorality", "Pornography", "Fantasy", "Objectification"],
                lie: "This sin satisfies me; I need this for fulfillment",
                freedom: "PURITY & HOLINESS",
                scripture: "Flee from sexual immorality. All other sins a person commits are outside the body, but whoever sins sexually, sins against their own body.",
                reference: "1 Corinthians 6:18"
            },
            {
                name: "ENVY/JEALOUSY",
                icon: "fa-eye",
                examples: ["Covetousness", "Comparison", "Discontentment", "Rivalry"],
                lie: "What others have should be mine; God is withholding good from me",
                freedom: "CONTENTMENT & GRATITUDE",
                scripture: "Keep your lives free from the love of money and be content with what you have, because God has said, 'Never will I leave you; never will I forsake you.'",
                reference: "Hebrews 13:5"
            },
            {
                name: "UNBELIEF",
                icon: "fa-question",
                examples: ["Doubt", "Skepticism", "Hardness of heart", "Cynicism"],
                lie: "God's promises are not true for me; faith doesn't work",
                freedom: "FAITH & TRUST",
                scripture: "Now faith is confidence in what we hope for and assurance about what we do not see.",
                reference: "Hebrews 11:1"
            },
            {
                name: "REBELLION",
                icon: "fa-hand-middle-finger",
                examples: ["Defiance", "Stubbornness", "Lawlessness", "Independence from God"],
                lie: "I know better than God; I can live life my own way",
                freedom: "OBEDIENCE & SUBMISSION",
                scripture: "If you love me, keep my commands.",
                reference: "John 14:15"
            },
            {
                name: "GREED/MATERIALISM",
                icon: "fa-money-bill-wave",
                examples: ["Hoarding", "Selfishness", "Consumerism", "Idolatry of wealth"],
                lie: "My security and worth come from what I possess",
                freedom: "GENEROSITY & STEWARDSHIP",
                scripture: "No one can serve two masters. Either you will hate the one and love the other, or you will be devoted to the one and despise the other. You cannot serve both God and money.",
                reference: "Matthew 6:24"
            },
            {
                name: "UNFORGIVENESS TOWARD SELF",
                icon: "fa-circle-xmark",
                examples: ["Self-hatred", "Inability to move forward", "Dwelling on past sins"],
                lie: "I can never be forgiven; my past defines my future",
                freedom: "GRACE & SELF-FORGIVENESS",
                scripture: "If we confess our sins, he is faithful and just and will forgive us our sins and purify us from all unrighteousness.",
                reference: "1 John 1:9"
            }
        ];

        const examplePrompts = [
            "What strongholds might I have if I constantly worry about what others think?",
            "Help me identify patterns of control in my relationships",
            "I struggle with comparing myself to others. What stronghold is this?",
            "Im a CEO of the biggest Generative AI company Google, who are my competitors and what should I build next",
            "How can I overcome bitterness toward someone who hurt me?",
            "What does the Bible say about breaking free from fear?",
            "I feel unworthy of God's love. Which stronghold might this be?",
            "Guide me through recognizing areas where pride manifests in my life",
            "How do I know if I'm dealing with shame or guilt?"
        ];

        let conversationHistory = JSON.parse(localStorage.getItem('conversationHistory') || '[]');
        let currentConversation = [];
        let isFullscreen = false;
        let selectedStronghold = null;

        function renderStrongholds(filter = '') {
            const grid = document.getElementById('strongholdGrid');
            const filtered = strongholds.filter(s =>
                s.name.toLowerCase().includes(filter.toLowerCase()) ||
                s.examples.some(e => e.toLowerCase().includes(filter.toLowerCase())) ||
                s.freedom.toLowerCase().includes(filter.toLowerCase())
            );

            grid.innerHTML = filtered.map(s => `
                <div class="stronghold-card ${selectedStronghold === s.name ? 'selected' : ''}" onclick="selectStronghold('${s.name}')">
                    <h3><i class="fas ${s.icon}"></i> ${s.name}</h3>
                    <div class="examples"><strong>Examples:</strong> ${s.examples.join(', ')}</div>
                    <div class="freedom"><i class="fas fa-arrow-right"></i> ${s.freedom}</div>
                </div>
            `).join('');
        }

        function selectStronghold(name) {
            selectedStronghold = name;
            const stronghold = strongholds.find(s => s.name === name);
            renderStrongholds(document.getElementById('searchBar').value);
            showDetailModal(stronghold);
        }

        function showDetailModal(stronghold) {
            const modal = document.getElementById('detailModal');
            const content = document.getElementById('modalContent');

            content.innerHTML = `
                <h3><i class="fas ${stronghold.icon}"></i> ${stronghold.name}</h3>

                <div class="detail-section">
                    <h4>Common Manifestations:</h4>
                    <p>${stronghold.examples.join(', ')}</p>
                </div>

                <div class="detail-section">
                    <h4>The Lie Behind It:</h4>
                    <p><em>"${stronghold.lie}"</em></p>
                </div>

                <div class="detail-section">
                    <h4>The Freedom in Christ:</h4>
                    <p><strong>${stronghold.freedom}</strong></p>
                </div>

                <div class="scripture">
                    "${stronghold.scripture}"<br>
                    <strong>— ${stronghold.reference}</strong>
                </div>

                <button class="btn btn-primary" onclick="askAboutStronghold('${stronghold.name}')" style="margin-top: 20px;">
                    <i class="fas fa-comments"></i> Get AI Guidance on ${stronghold.name}
                </button>
                <button class="btn btn-secondary" onclick="closeModal()" style="margin-top: 20px;">
                    Close
                </button>
            `;

            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        function askAboutStronghold(name) {
            closeModal();
            const stronghold = strongholds.find(s => s.name === name);
            const prompt = `Help me understand and overcome the stronghold of ${name}. What are practical steps I can take?`;
            document.getElementById('chatInput').value = prompt;
            sendMessage();
        }

        function renderPromptPills() {
            const select = document.getElementById('promptSelect');
            select.innerHTML = '<option value="">-- Select an example prompt --</option>' +
                examplePrompts.map((prompt, i) => `<option value="${i}">${prompt}</option>`).join('');
        }

        function usePrompt(index) {
            if (index === '') return;
            document.getElementById('chatInput').value = examplePrompts[index];
            document.getElementById('chatInput').focus();
            document.getElementById('promptSelect').value = '';
        }

        function addMessage(role, content) {
            const messages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            // Convert markdown to HTML for assistant messages
            const htmlContent = role === 'assistant' ? markdownToHtml(content) : content.replace(/\n/g, '<br>');

            if (role === 'assistant') {
                messageDiv.innerHTML = `
                    <div class="message-actions">
                        <button class="icon-btn" onclick="saveAsHtml(this)" title="Save as HTML">
                            <i class="fas fa-file-download"></i>
                        </button>
                        <button class="icon-btn" onclick="emailResponse(this)" title="Email this">
                            <i class="fas fa-envelope"></i>
                        </button>
                    </div>
                    ${htmlContent}
                `;
            } else {
                messageDiv.innerHTML = htmlContent;
            }

            messages.appendChild(messageDiv);
            messages.scrollTop = messages.scrollHeight;
        }



        // API Configuration - Users need to add their API key here
        let API_KEY = localStorage.getItem('apiKey') || '';
        let API_PROVIDER = localStorage.getItem('apiProvider') || 'openai'; // 'openai' or 'gemini'

        function showApiKeyPrompt() {
            const modal = document.getElementById('detailModal');
            const content = document.getElementById('modalContent');

        async function callOpenAI(message) {
            const systemPrompt = `You are a compassionate Christian counselor helping people identify and overcome spiritual strongholds. Here are the strongholds we're focusing on: ${JSON.stringify(strongholds.map(s => ({name: s.name, examples: s.examples, lie: s.lie, freedom: s.freedom})))}.

Provide thoughtful, biblical guidance. Be encouraging, specific, and practical. Reference relevant scriptures when appropriate.`;

            const response = await fetch('https://api.openai.com/v1/chat/completions', {

                },
                body: JSON.stringify({

         function markdownToHtml(markdown) {
            let html = markdown;

            // Tables - must be processed first before other replacements
            html = html.replace(/\|(.+)\|/g, (match, content) => {
                // Check if this is a separator row (contains only -, :, |, and spaces)
                if (/^[\s\-:|]+$/.test(content)) {
                    return ''; // Skip separator rows
                }
                const cells = content.split('|').map(cell => cell.trim()).filter(cell => cell);
                return '<tr>' + cells.map(cell => `<td>${cell}</td>`).join('') + '</tr>';
            });


            // Wrap table rows in table tags
            // html = html.replace(/(<tr>.*?<\/tr>)/s, (match) => {
            // FIX To this:
            html = html.replace(/(<tr>.*?<\/tr>\s*)+/gs, (match) => {
                const rows = match.match(/<tr>.*?<\/tr>/g);
                if (rows && rows.length > 0) {
                    const headerRow = rows[0].replace(/<td>/g, '<th>').replace(/<\/td>/g, '</th>');
                    const bodyRows = rows.slice(1).join('');
                    return `<table style="width: 100%; border-collapse: collapse; margin: 15px 0;">
                        <thead style="background: #667eea; color: white;">${headerRow}</thead>
                        <tbody>${bodyRows}</tbody>
                    </table>`;
                }
                return match;
            });

            // Headers
            html = html.replace(/^#### (.*$)/gim, '<h4>$1</h4>');
            html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');

            // Bold
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');

            // Italic
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
            html = html.replace(/_(.+?)_/g, '<em>$1</em>');

            // Code blocks
            html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Unordered lists
            html = html.replace(/^\* (.+)$/gim, '<li>$1</li>');
            html = html.replace(/^- (.+)$/gim, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');

            // Ordered lists
            html = html.replace(/^\d+\. (.+)$/gim, '<li>$1</li>');

            // Links
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

            // Bible references - convert to BibleGateway links
            html = html.replace(/(\d?\s?[A-Z][a-z]+(?:\s+[A-Z][a-z]+)?)\s+(\d+):(\d+(?:-\d+)?)/g,
                '<a href="https://www.biblegateway.com/passage/?search=$1+$2:$3&version=NIV" target="_blank" style="color: #764ba2; text-decoration: underline;">$1 $2:$3</a>');

            // Line breaks
            html = html.replace(/\n\n/g, '</p><p>');
            html = html.replace(/\n/g, '<br>');

            // Wrap in paragraph if not already wrapped
            if (!html.startsWith('<')) {
                html = '<p>' + html + '</p>';
            }

            return html;
        }

            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        document.getElementById('toggleViewBtn').addEventListener('click', toggleView);

        document.getElementById('historyBtn').addEventListener('click', toggleHistory);

        document.getElementById('apiSettingsBtn').addEventListener('click', showApiKeyPrompt);

        document.getElementById('closeHistoryBtn').addEventListener('click', toggleHistory);

        document.getElementById('promptSelect').addEventListener('change', (e) => {
            usePrompt(e.target.value);
        });

        document.getElementById('detailModal').addEventListener('click', (e) => {
            if (e.target.id === 'detailModal') {
                closeModal();
            }
        });

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            renderStrongholds();
            renderPromptPills();
            renderHistory();

            // Start in split view on desktop
            if (window.innerWidth > 768) {
                document.getElementById('mainContent').classList.add('split-view');
            }

            // Welcome message
            addMessage('system', `Welcome! I'm here to help you explore spiritual strongholds and find freedom in Christ.

You can:
- Click on any stronghold card to learn more
- Use the example prompts or ask your own questions
- View and manage your conversation history

How can I assist you today?`);
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            if (window.innerWidth <= 768 && !isFullscreen) {
                document.getElementById('mainContent').classList.remove('split-view');
            } else if (window.innerWidth > 768 && !isFullscreen) {
                document.getElementById('mainContent').classList.add('split-view');
            }
        });
    </script>
</body>
</html>
